<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aman's Portal v1</title>
    <style>
        body { background-color: #000; color: #0f0; font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .box { border: 2px solid #0f0; padding: 20px; border-radius: 10px; box-shadow: 0 0 15px #0f0; text-align: center; width: 80%; max-width: 400px; }
        h1 { font-size: 1.5rem; text-transform: uppercase; margin-bottom: 20px; }
        input, textarea { width: 90%; padding: 10px; margin: 10px 0; background: #111; border: 1px solid #0f0; color: #0f0; border-radius: 5px; }
        button { background: #0f0; color: #000; border: none; padding: 12px 20px; font-weight: bold; cursor: pointer; width: 100%; border-radius: 5px; margin-top: 10px; }
        button:active { background: #0a0; }
        #display { margin-top: 20px; font-size: 0.9rem; text-align: left; width: 100%; max-height: 150px; overflow-y: auto; }
    </style>
</head>
<body>

    <div class="box">
        <h1>PORTAL: LEARNING_v1</h1>
        
        <input type="text" id="subject" placeholder="Subject (e.g. C++, AI)">
        <textarea id="log" placeholder="What did you master today?" rows="3"></textarea>
        
        <button onclick="saveLog()">LOCK TO MEMORY</button>

        <div id="display"></div>
    </div>

    <script>
        function saveLog() {
            let s = document.getElementById('subject').value;
            let l = document.getElementById('log').value;
            if(!s || !l) return alert("Fill all fields!");

            let data = { s: s, l: l, d: new Date().toLocaleDateString() };
            let db = JSON.parse(localStorage.getItem('logs') || "[]");
            db.unshift(data);
            localStorage.setItem('logs', JSON.stringify(db));
            
            document.getElementById('subject').value = "";
            document.getElementById('log').value = "";
            show();
        }

        function show() {
            let db = JSON.parse(localStorage.getItem('logs') || "[]");
            document.getElementById('display').innerHTML = db.map(i => `<p><b>[${i.d}] ${i.s}:</b> ${i.l}</p>`).join('');
        }
        show();
    </script>
</body>
</html>
