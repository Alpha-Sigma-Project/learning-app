name: Build Android AAB
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Build AAB
        run: |
          echo "Building Aman Portal App Bundle..."
          # Yahan hum Capacitor ya Cordova ki commands add karenge
          # Abhi ke liye hum sirf workflow check kar rahe hain
          mkdir -p build
          cp index.html build/
          
      - name: Upload AAB
        uses: actions/upload-artifact@v3
        with:
          name: Aman-Portal-AAB
          path: build/
